<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historica: Mathematical Mayhem</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Special+Elite&family=Crimson+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1008; --parchment: #f5edd6; --gold: #c9920a; --blood: #8b0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Crimson Pro', serif; 
            background: var(--parchment); 
            color: var(--ink); 
            overflow: hidden;
            background-image: radial-gradient(#d4c090 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(201, 146, 10, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(201, 146, 10, 0); } 100% { box-shadow: 0 0 0 0 rgba(201, 146, 10, 0); } }

        /* General UI */
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .panel { 
            background: rgba(255, 255, 255, 0.95); 
            border: 4px double var(--ink); 
            padding: 2.5rem; 
            box-shadow: 15px 15px 0 var(--ink); 
            max-width: 500px; 
            width: 90%; 
            text-align: center;
            position: relative;
        }

        .btn-primary { 
            background: var(--ink); color: white; border: none; padding: 15px 25px; 
            font-family: 'Special Elite'; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 15px;
        }
        .btn-primary:hover { background: var(--gold); transform: scale(1.02); }

        /* Game Elements */
        .chaotic-btn {
            position: absolute; padding: 15px; font-family: 'Special Elite';
            background: #fff; border: 2px solid var(--ink); cursor: pointer;
            z-index: 20; box-shadow: 4px 4px 0 var(--ink); transition: 0.2s;
        }
        .chaotic-btn:hover { background: var(--gold); color: white; z-index: 100; }
        
        #logic-gate {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 380px; background: white; border: 3px solid var(--blood); padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2); animation: float 3s infinite ease-in-out;
            z-index: 1000;
        }

        /* The Ghost-Killer Overlay */
        #wait-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); 
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 9999;
        }
        #wait-overlay.active { display: flex; }

        .lb-item { 
            display: flex; justify-content: space-between; padding: 12px; 
            border-bottom: 1px solid #ddd; font-family: 'Special Elite';
        }
    </style>
</head>
<body>

<div id="wait-overlay">
    <h1 style="color:var(--gold); font-size: 3.5rem; font-family: 'Playfair Display';">ERA RECORDED</h1>
    <p style="color:white; font-family: 'Special Elite';">Synchronizing the timeline...</p>
</div>

<div id="screen-home" class="screen active">
    <div class="panel">
        <h1 style="font-family:'Playfair Display'; font-size: 3.5rem; margin-bottom: 1rem;">HISTORICA</h1>
        <button class="btn-primary" onclick="nav('setup')">CREATE ERA</button>
        <button class="btn-primary" onclick="nav('join')" style="background:#444">JOIN ERA</button>
    </div>
</div>

<div id="screen-setup" class="screen">
    <div class="panel">
        <h2>ERA CONFIG</h2>
        <input type="text" id="host-name" placeholder="Historian Name" style="width:100%; padding:12px; margin: 10px 0;">
        <label>Era Duration (Sec)</label>
        <input type="number" id="time-limit" value="30" style="width:100%; padding:12px;">
        <button class="btn-primary" onclick="hostGame()">IGNITE ERA</button>
    </div>
</div>

<div id="screen-join" class="screen">
    <div class="panel">
        <h2>JOIN TIMELINE</h2>
        <input type="text" id="player-name" placeholder="Your Name" style="width:100%; padding:12px; margin: 5px 0;">
        <input type="text" id="room-code" placeholder="Era Code" style="width:100%; padding:12px; text-transform:uppercase;">
        <button class="btn-primary" onclick="joinGame()">ENTER</button>
    </div>
</div>

<div id="screen-lobby" class="screen">
    <div class="panel">
        <p>ACCESS CODE</p>
        <h1 id="view-code" style="color:var(--gold); font-size:4rem; letter-spacing:10px;">----</h1>
        <div id="lobby-players" style="margin: 20px 0; max-height: 200px; overflow-y: auto;"></div>
        <button id="host-start-btn" class="btn-primary" style="display:none" onclick="triggerStart()">BEGIN VOYAGE</button>
    </div>
</div>

<div id="screen-game" class="screen">
    <div style="position:fixed; top:0; width:100%; background:var(--ink); color:white; padding:15px; display:flex; justify-content:space-between; z-index:1000;">
        <span id="game-info">ERA 1/20</span>
        <span id="player-score" style="color:var(--gold)">0 pts</span>
    </div>
    <div id="progress-bar" style="position:fixed; top:54px; height:6px; background:var(--gold); width:100%; transition:width 1s linear;"></div>
    
    <div class="panel" style="margin-top:-60px;">
        <h3 id="question-text" style="line-height:1.4;"></h3>
    </div>
    
    <div id="chaos-container" style="width:100%; height:100%; position:absolute; top:0; left:0;"></div>
    
    <div id="logic-gate">
        <p style="font-size:0.8rem; color:var(--blood); font-weight:bold;">DECODE TO UNLOCK:</p>
        <div style="display:flex; gap:10px; margin:10px 0; justify-content:center;">
            <span id="math-display" style="font-family:'Special Elite'; font-size:1.2rem;"></span>
            <input type="number" id="math-input" style="width:70px; font-size:1.1rem;" oninput="solveMath(this.value)">
        </div>
        <input type="text" id="hint-input" placeholder="Type Hint Keyword..." style="width:100%; padding:8px;" oninput="solveHint(this.value)">
        <p style="font-size:0.6rem; margin-top:5px;">Long Word Hint: <span id="hint-word" style="color:blue; font-weight:bold;"></span></p>
    </div>
</div>

<div id="screen-leaderboard" class="screen">
    <div class="panel">
        <h2 style="font-family:'Playfair Display'; margin-bottom:1rem;">STANDINGS</h2>
        <div id="leaderboard-data" style="width:100%"></div>
        <button id="host-next-btn" class="btn-primary" style="display:none" onclick="triggerNext()">NEXT ERA</button>
        <p id="wait-label" style="display:none; margin-top:15px; font-style:italic;">Waiting for Historian...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDW-UE-a4TMRcfz3E13mLOgBtx6bywwCtE",
        authDomain: "history-780ec.firebaseapp.com",
        databaseURL: "https://history-780ec-default-rtdb.firebaseio.com",
        projectId: "history-780ec",
        storageBucket: "history-780ec.firebasestorage.app",
        messagingSenderId: "426243337205",
        appId: "1:426243337205:web:fc7f097a6fa0497297cebc",
        measurementId: "G-Q1Z3N3BSVB"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const BANK = [
        {q:"Which 1851 event in London showcased industrial wonders?", a:["Great Exhibition","World's Fair","Expo 51","Victory Gala"], c:0},
        {q:"Who led the 'Red Shirts' in Italian Unification (1860)?", a:["Garibaldi","Mazzini","Cavour","Victor Emmanuel"], c:0},
        {q:"Which 1863 decree 'freed' enslaved people in the US?", a:["Emancipation Proclamation","13th Amendment","Gettysburg Address","Civil Rights Act"], c:0},
        {q:"The Meiji Restoration (1868) happened in which country?", a:["Japan","China","Korea","Siam"], c:0},
        {q:"What canal opened in 1869 connecting the Med and Red Sea?", a:["Suez","Panama","Erie","Kiel"], c:0},
        {q:"Alexander Graham Bell patented what in 1876?", a:["Telephone","Radio","Phonograph","Telegraph"], c:0},
        {q:"The 1884 Berlin Conference partitioned which continent?", a:["Africa","Asia","South America","Oceania"], c:0},
        {q:"What 1894 affair divided France over antisemitism?", a:["Dreyfus Affair","Napoleonic Trial","Zola Case","Bastille Riot"], c:0},
        {q:"The Boxer Rebellion (1899) took place where?", a:["China","India","Japan","Philippines"], c:0},
        {q:"Who discovered Radium in 1898?", a:["Marie Curie","Albert Einstein","Isaac Newton","Max Planck"], c:0}
    ];

    const HINTS = ["ANTIDISESTABLISHMENTARIANISM", "INCOMPREHENSIBILITIES", "FLOCCINAUCINIHILIPILIFICATION", "HONORIFICABILITUDINITATIBUS"];

    let g = {
        isHost: false,
        code: '',
        id: 'p' + Math.random().toString(36).substr(2, 5),
        currentIdx: -1,
        score: 0,
        unlocked: false,
        timer: null
    };

    window.nav = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.getElementById('wait-overlay').classList.remove('active'); // Safety clear
    };

    window.hostGame = async () => {
        g.isHost = true;
        g.code = Math.random().toString(36).substr(2, 4).toUpperCase();
        const duration = parseInt(document.getElementById('time-limit').value) || 30;
        
        await set(ref(db, 'rooms/' + g.code), {
            status: 'lobby',
            duration: duration,
            currentIdx: -1,
            questions: BANK.sort(() => Math.random() - 0.5),
            players: { [g.id]: { name: document.getElementById('host-name').value || 'Host', score: 0, done: false } }
        });
        
        startListening();
        document.getElementById('view-code').innerText = g.code;
        document.getElementById('host-start-btn').style.display = 'block';
        nav('lobby');
    };

    window.joinGame = async () => {
        const code = document.getElementById('room-code').value.toUpperCase();
        const snap = await get(ref(db, `rooms/${code}`));
        if (!snap.exists()) return alert("Era not found!");
        
        g.code = code;
        await update(ref(db, `rooms/${code}/players/${g.id}`), {
            name: document.getElementById('player-name').value || 'Traveler',
            score: 0,
            done: false
        });
        
        startListening();
        document.getElementById('view-code').innerText = code;
        nav('lobby');
    };

    function startListening() {
        onValue(ref(db, 'rooms/' + g.code), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const players = Object.values(data.players).sort((a,b) => b.score - a.score);
            const listHtml = players.map(p => `<div class="lb-item"><span>${p.name}</span><b>${p.score}</b></div>`).join('');
            document.getElementById('lobby-players').innerHTML = listHtml;
            document.getElementById('leaderboard-data').innerHTML = listHtml;

            // STATE LOGIC
            if (data.status === 'leaderboard') {
                // THE CRITICAL FIX: Explicitly kill the overlay on state change
                document.getElementById('wait-overlay').classList.remove('active');
                clearInterval(g.timer);
                nav('leaderboard');
                if (g.isHost) {
                    document.getElementById('host-next-btn').style.display = 'block';
                    document.getElementById('wait-label').style.display = 'none';
                } else {
                    document.getElementById('wait-label').style.display = 'block';
                }
            } 
            else if (data.status === 'game' && data.currentIdx !== g.currentIdx) {
                g.currentIdx = data.currentIdx;
                g.questions = data.questions;
                g.duration = data.duration;
                document.getElementById('wait-overlay').classList.remove('active');
                renderGame();
            }

            if (g.isHost && data.status === 'game') {
                if (Object.values(data.players).every(p => p.done)) {
                    update(ref(db, 'rooms/' + g.code), { status: 'leaderboard' });
                }
            }
        });
    }

    window.triggerStart = () => update(ref(db, 'rooms/' + g.code), { status: 'game', currentIdx: 0 });

    function renderGame() {
        const q = g.questions[g.currentIdx];
        g.unlocked = false;
        
        document.getElementById('game-info').innerText = `ERA ${g.currentIdx + 1}/10`;
        document.getElementById('question-text').innerText = q.q;
        
        // Math Setup
        const n1 = Math.floor(Math.random()*7)+3;
        const n2 = Math.floor(Math.random()*7)+3;
        g.mathAns = n1 * n2;
        document.getElementById('math-display').innerText = `${n1} x ${n2} =`;
        document.getElementById('math-input').value = '';
        
        // Hint Setup
        g.hintWord = HINTS[Math.floor(Math.random()*HINTS.length)];
        document.getElementById('hint-word').innerText = g.hintWord;
        document.getElementById('hint-input').value = '';

        // Answer Buttons
        const container = document.getElementById('chaos-container');
        container.innerHTML = '';
        const choices = q.a.map((t, i) => ({ t, correct: i === q.c })).sort(() => Math.random() - 0.5);

        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'chaotic-btn';
            btn.innerText = choice.t;
            btn.style.left = (Math.random()*65 + 10) + '%';
            btn.style.top = (Math.random()*50 + 20) + '%';
            btn.style.opacity = '0.05';
            btn.disabled = true;
            btn.style.transform = `rotate(${(Math.random()-0.5)*120}deg)`;
            
            btn.onclick = () => {
                if (choice.correct) g.score += 100;
                document.getElementById('player-score').innerText = g.score + " pts";
                submitAnswer();
            };
            container.appendChild(btn);
        });

        startClock();
        nav('game');
    }

    window.solveMath = (val) => {
        if (parseInt(val) === g.mathAns) {
            g.unlocked = true;
            document.querySelectorAll('.chaotic-btn').forEach(b => {
                b.disabled = false;
                b.style.opacity = '1';
                b.style.animation = 'pulse-gold 2s infinite';
            });
        }
    };

    window.solveHint = (val) => {
        if (val.toUpperCase() === g.hintWord) {
            const correctText = g.questions[g.currentIdx].a[g.questions[g.currentIdx].c];
            document.querySelectorAll('.chaotic-btn').forEach(b => {
                if (b.innerText === correctText) {
                    b.style.border = "6px solid var(--gold)";
                    b.style.background = "#fff";
                    b.style.zIndex = "100";
                }
            });
        }
    };

    function startClock() {
        let remaining = g.duration;
        const bar = document.getElementById('progress-bar');
        clearInterval(g.timer);
        g.timer = setInterval(() => {
            remaining--;
            bar.style.width = (remaining / g.duration * 100) + '%';
            if (remaining <= 0) {
                clearInterval(g.timer);
                submitAnswer();
            }
        }, 1000);
    }

    async function submitAnswer() {
        // Only show overlay if we aren't on leaderboard yet
        if (document.getElementById('screen-game').classList.contains('active')) {
            document.getElementById('wait-overlay').classList.add('active');
        }
        await update(ref(db, `rooms/${g.code}/players/${g.id}`), { done: true, score: g.score });
        if (g.isHost) {
            setTimeout(() => {
                update(ref(db, 'rooms/' + g.code), { status: 'leaderboard' });
            }, 600);
        }
    }

    window.triggerNext = async () => {
        const next = g.currentIdx + 1;
        if (next >= 10) return alert("ERA OF DISCOVERY COMPLETE");
        
        const snap = await get(ref(db, `rooms/${g.code}/players`));
        const players = snap.val();
        for (let id in players) players[id].done = false;
        
        update(ref(db, 'rooms/' + g.code), {
            status: 'game',
            currentIdx: next,
            players: players
        });
    };
</script>
</body>
</html>
